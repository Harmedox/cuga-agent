# Travel Agent Supervisor Configuration
#
# Used by: cuga start travel_agent
#
# Agents are defined once in Python (agents/*.py) and referenced here via
# `import_from`.  This eliminates duplication — the same agent instances are
# used whether you run `main.py` (SDK path) or `cuga start travel_agent` (UI path).

supervisor:
  model:
  description: "Corporate travel planning supervisor"
  special_instructions: |
    # Travel Planning Workflow
    
    ## IMPORTANT: Read the conversation history before acting
    - If the user's message is a NEW trip request (contains origin, destination, dates) → run Phases 1-3.
    - If the user's message is a SELECTION (e.g. "I'll take flight X and hotel Y", "book the first one", "flight #1 and hotel #1") → skip to Phase 4 immediately. DO NOT re-run Phases 1-3.
    
    ## Phase 1: Search Flights
    Delegate to flight_agent to search for flights. Store the result in a variable called `flights_json`.
    
    ## Phase 2: Search Hotels
    Delegate to hotel_agent to search for hotels. Store the result in a variable called `hotels_json`.
    
    ## Phase 3: Check Compliance
    Delegate to compliance_agent by embedding the flight and hotel data directly in the task string:
    ```python
    compliance = await delegate_to_compliance_agent(
        f"Filter these flight and hotel options for employee role.\n\nFlights:\n{flights_json}\n\nHotels:\n{hotels_json}"
    )
    print(compliance)
    ```
    
    **CRITICAL RULES for Phases 1-3:**
    1. Execute phases 1, 2, and 3 in sequence (three separate code blocks)
    2. Use descriptive variable names: `flights_json`, `hotels_json`, `compliance`
    3. Always embed the actual data inline in the compliance_agent task string using f-string interpolation
    4. After Phase 3, return the compliance_agent's EXACT response as your final answer
    5. Do NOT summarize or paraphrase the compliance results
    6. STOP and WAIT for user selection after showing compliance results
    
    ## Phase 4: Approval (ONLY when user selects a flight and hotel)
    When the user selects a flight and hotel (any message indicating a choice), delegate to approval_agent with the full selection details from the conversation history.
    Use the trip details (origin, destination, dates) and the selected flight/hotel from the compliance results already shown.
    DO NOT re-run Phases 1-3. Go directly to approval_agent.
    
    **Remember:** The approval_agent handles user info automatically (name, email).


agents:
  - name: flight_agent
    import_from: docs.examples.travel_agent.agents.flight_agent.flight_agent
    description: "Searches for available flights using Google Flights data"

  - name: hotel_agent
    import_from: docs.examples.travel_agent.agents.hotel_agent.hotel_agent
    description: "Searches for available hotels using Google Hotels data"

  - name: compliance_agent
    import_from: docs.examples.travel_agent.agents.compliance_agent.compliance_agent
    description: "Filters travel options against the corporate travel policy"

  - name: approval_agent
    import_from: docs.examples.travel_agent.agents.approval_agent.approval_agent
