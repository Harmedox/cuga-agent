image:
  repository: pgvector/pgvector
  tag: pg16
  pullPolicy: IfNotPresent

# Optional (e.g. Docker Hub authenticated pulls). K8s format: [{ name: "secret-name" }]
imagePullSecrets: []

auth:
  database: cuga
  username: cuga
  password: ""
  existingSecret: ""
  existingSecretKey: password

service:
  type: ClusterIP
  port: 5432

persistence:
  enabled: true
  size: 2Gi

resources: {}
  # requests:
  #   memory: 256Mi
  #   cpu: 100m
  # limits:
  #   memory: 512Mi
  #   cpu: 500m
